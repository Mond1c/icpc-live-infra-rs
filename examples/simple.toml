[topology]
name = "Test sleep"

[[node]]
name = "sleep_node"
host = "127.0.0.1"
agent_port = 8080
services = ["sleep", "logging"]

[[service]]
name = "sleep"
command = "sleep"
args = ["3"]
restart = "always"
depends_on = [{ service = "logging", node = "sleep_node"}]

[[service]]
name = "logging"
command = "python3"
args = ["examples/main.py"]
restart = "always"
healthcheck = { http = "http://localhost:8080", interval_ms = 5000, timeout_ms = 2000 }
